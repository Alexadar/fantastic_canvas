# typos.toml â€” allowlist for `crate-ci/typos`.
#
# Run by .github/workflows/spellcheck.yml on every PR. Add a term
# here when it's an intentional identifier the spell-checker flags
# as a typo. Keep the list small â€” every entry weakens the gate.

[default.extend-identifiers]
# io_bridge's bidirectional in-process transport names its
# queues by direction: q_ab carries Aâ†’B, q_ba carries Bâ†’A. The
# pair is symmetric; renaming half breaks the symmetry.
q_ba = "q_ba"
q_ab = "q_ab"
close_b = "close_b"
close_a = "close_a"

[default.extend-words]
# Python tests sometimes use single-letter or two-letter locals
# like `a`, `b`, `ot` for shorthand fixtures. `ot` reads as "object
# under test" in test_integration.py.
ot = "ot"
# `ba`/`ab` appear as suffixes in queue names (see q_ba/q_ab above)
# AND as part of `ws_bridge` doc prose ("ba" = B-to-A direction
# marker). Whole-word allowance covers both.
ba = "ba"
ab = "ab"
# `hel` is a deliberately truncated streaming-chunk fixture in
# nvidia_nim_backend's tests â€” simulates an SSE delta that only
# carries the first 3 chars of "hello". Not a typo of `help`.
hel = "hel"
# `unparseable` is a valid English spelling (less common than
# `unparsable` but in OED). Used in nvidia_nim_backend's Rust doc
# comment + Python test name. Allowlisted rather than rewritten to
# avoid touching Python tests we don't otherwise need to edit.
unparseable = "unparseable"
# `ags` is a deliberate shorthand local for "agents" in a selftest
# python one-liner (`ags = json.load(...)['agents']`), same spirit as
# `ot`/`hel` above.
ags = "ags"
# `mis` is the prefix in the auth comment "rather than silently mis-securing"
# (io_bridge ingress rules, mirrored across py/rust/swift); the hyphen makes
# typos read it as a standalone word. Intentional English prefix, not `miss`.
mis = "mis"
# `strat` is the deliberate shorthand for "strategy" in the Context Protocol's
# overflow-strategy seam (`strat_name` / `stratName` / `strategy=strat`),
# mirrored across py/rust/swift. Not a typo of `start`/`strata`.
strat = "strat"

[files]
# Skip vendored third-party JS / CSS assets â€” minified bundles
# contain mangled identifiers (e.g. Three.js's `metalness`, `LOD`,
# minified two-letter symbols `Ue`, `Pn`, `Nd`) that typos
# heuristics flag as misspellings.
extend-exclude = [
    "**/.fantastic/",
    "**/.build/",
    "swift/Sources/FantasticWeb/Resources/",
    # Rust mirror of the same vendored assets (Three.js `metalness`/`lod`/
    # `LOD`, xterm minified two-letter symbols). The Swift copy is already
    # excluded above; the Rust kernel restoration brought the same files in.
    "rust/crates/bundles/fantastic-web/src/assets/",
    # The TS frontend kernel's own copies of those vendored bundles
    # (Three.js `LOD`, xterm's minified `diposable`/`Sur`, â€¦) â€” the
    # originals the swift/rust copies above mirror.
    "ts/src/vendor/",
]
