# UniFFI bindings configuration.
#
# Without this, every `[Async]` function in `fantastic.udl` runs on
# UniFFI's default executor (no Tokio reactor). Our impls call into
# `kernel.send()` → `tokio::spawn` / `tokio::mpsc` / `axum::serve`,
# all of which panic with:
#   "there is no reactor running, must be called from the context
#    of a Tokio 1.x runtime"
# the moment they touch a tokio primitive.
#
# `async_runtime = "tokio"` is GLOBAL — applies to every async UDL
# function in this binding. Both of ours (start_kernel + send_json)
# need Tokio; no per-function override needed.
#
# Docs: https://mozilla.github.io/uniffi-rs/latest/futures.html#async-runtimes

[bindings.swift]
async_runtime = "tokio"

[bindings.kotlin]
async_runtime = "tokio"

[bindings.python]
async_runtime = "tokio"
