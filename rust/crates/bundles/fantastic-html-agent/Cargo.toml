[package]
name = "fantastic-html-agent"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "UI-as-a-record bundle — agent stores its HTML body next to agent.json."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
