[package]
name = "fantastic-terminal-backend"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "PTY shell + flow control + UTF-8 incremental decode + image-paste — VSCode-class terminal robustness."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
portable-pty = "0.8"
encoding_rs = "0.8"
base64 = "0.22"
libc = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
