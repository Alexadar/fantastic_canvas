[package]
publish = false
name = "fantastic-nvidia-nim-backend"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "NVIDIA NIM (OpenAI-compatible) LLM bundle — same surface as ollama_backend, different transport."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
futures-util = "0.3"

[dev-dependencies]
fantastic-file = { path = "../fantastic-file" }
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
wiremock = "0.6"
