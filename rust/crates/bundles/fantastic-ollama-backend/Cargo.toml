[package]
name = "fantastic-ollama-backend"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Local LLM (ollama) bundle — streaming tokens + tool-calls, LLM contract reference impl."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
futures-util = "0.3"

[dev-dependencies]
fantastic-file = { path = "../fantastic-file" }
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
wiremock = "0.6"
