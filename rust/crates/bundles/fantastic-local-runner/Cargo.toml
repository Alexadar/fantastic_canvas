[package]
publish = false
name = "fantastic-local-runner"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Local `fantastic` lifecycle — start/stop/restart/status a child fantastic process in another workdir."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
which = "6"
nix = { version = "0.29", features = ["signal"] }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
