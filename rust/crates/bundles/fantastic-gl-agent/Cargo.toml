[package]
publish = false
name = "fantastic-gl-agent"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GL-view-as-a-record bundle — agent stores its glsl_source on agent.json; canvas hosts probe get_gl_view."

[dependencies]
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
