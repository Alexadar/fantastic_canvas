[package]
name = "fantastic-terminal-webapp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "xterm UI front-end as an agent — serves the terminal HTML at /<id>/, fronting a terminal_backend."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
