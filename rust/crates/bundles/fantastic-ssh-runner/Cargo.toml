[package]
publish = false
name = "fantastic-ssh-runner"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Remote `fantastic` lifecycle over SSH — start/stop/restart/status + local tunnel for canvas iframing."

[dependencies]
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
fantastic-runner-core = { path = "../fantastic-runner-core" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
which = "6"
nix = { version = "0.29", features = ["signal"] }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
