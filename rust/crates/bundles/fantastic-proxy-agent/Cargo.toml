[package]
publish = false
name = "fantastic-proxy-agent"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Host-implemented agent bundle — forwards every verb to a host implementation (Swift via UniFFI callback; or plain-Rust impl). Primary use: SwiftUI views as first-class agents in the kernel tree."

[dependencies]
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
