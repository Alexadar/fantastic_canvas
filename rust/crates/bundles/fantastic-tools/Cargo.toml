[package]
publish = false
name = "fantastic-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tool registry bundle — name → {agent_id, verb, schema, sender} entries that LLM-using bundles prepend to every model call. send IS the tool call; this bundle is the naming + schema layer over it."

[dependencies]
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
fantastic-proxy-agent = { path = "../fantastic-proxy-agent" }
tokio = { workspace = true, features = ["test-util", "macros"] }
