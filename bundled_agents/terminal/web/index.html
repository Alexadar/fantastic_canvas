<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>terminal</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #terminal { width: 100%; height: 100%; padding: 6px 12px 10px 12px; box-sizing: border-box; }
  .xterm, .xterm-viewport { background-color: transparent !important; background: transparent !important; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.9.0/lib/addon-unicode11.min.js"></script>
<!-- fantastic_transport() is injected by the web bundle as the first <script> in <head> -->
<script>
  const t = fantastic_transport()
  const d = t.dispatcher

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace",
    allowProposedApi: true,
    allowTransparency: true,
    theme: {
      background: '#00000000',
      foreground: '#e5e5e5',
      cursor: '#e5e5e5',
      selectionBackground: '#3b82f640',
    },
  })

  const fit = new FitAddon.FitAddon()
  const unicode11 = new Unicode11Addon.Unicode11Addon()
  term.loadAddon(fit)
  term.loadAddon(unicode11)
  term.unicode.activeVersion = '11'

  const container = document.getElementById('terminal')
  term.open(container)

  // Expose a scroll-to-bottom hook for the canvas plugin's autoscroll button.
  window.__scrollBottom = () => term.scrollToBottom()

  // xterm → backend (symmetric names: process_input, process_resize, process_create)
  term.onData(async (data) => {
    await d.process_input({ agent_id: t.agentId, data })
  })
  term.onResize(async ({ cols, rows }) => {
    await d.process_resize({ agent_id: t.agentId, cols, rows })
  })

  // backend → xterm (events in our inbox)
  t.on('process_output', (e) => {
    if (e.agent_id && e.agent_id !== t.agentId) return
    term.write(e.data)
  })
  t.on('process_closed', () => {
    term.clear()
  })

  // Fit + create
  const observer = new ResizeObserver(() => {
    clearTimeout(observer._t)
    observer._t = setTimeout(() => fit.fit(), 50)
  })
  observer.observe(container)

  requestAnimationFrame(async () => {
    fit.fit()
    try {
      await d.process_create({ agent_id: t.agentId, cols: term.cols, rows: term.rows })
    } catch (e) {
      console.warn('process_create failed', e)
    }
  })
</script>
</body>
</html>
