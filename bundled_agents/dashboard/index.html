<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0e; color: #e0e0e0;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    font-size: 14px; line-height: 1.5;
  }
  body { padding: 2em; overflow-y: auto; }

  header {
    display: flex; align-items: center; gap: 1em;
    margin-bottom: 2em; padding-bottom: 1em;
    border-bottom: 1px solid #222;
  }
  header h1 { font-size: 1.4em; font-weight: 600; }
  header .name { color: #d946ef; font-weight: 400; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #666; flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #22c55e; }

  .group { margin-bottom: 2em; }
  .group-title {
    font-size: 0.85em; color: #888; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.75em;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1em;
  }

  .card {
    background: #141418;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    padding: 1.2em;
    transition: border-color 0.2s;
    text-decoration: none; color: inherit;
    display: block;
  }
  .card:hover { border-color: #555; }
  .card.self { border-color: #d946ef; }
  .card.clickable { cursor: pointer; }

  .card-header {
    display: flex; align-items: center; gap: 0.6em;
    margin-bottom: 0.6em;
  }
  .card-name { font-weight: 600; font-size: 1.05em; }
  .badge {
    font-size: 0.7em; padding: 0.15em 0.5em;
    border-radius: 4px; background: #2a2a2e; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge.canvas { background: #1e293b; color: #60a5fa; }
  .badge.dashboard { background: #2d1b4e; color: #d946ef; }
  .badge.terminal { background: #1a2e1a; color: #4ade80; }

  .card-meta {
    font-size: 0.8em; color: #666;
    display: flex; flex-direction: column; gap: 0.25em;
  }
  .card-meta span { display: flex; align-items: center; gap: 0.4em; }

  .empty {
    color: #555; font-style: italic; padding: 2em 0;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="ws-dot"></div>
  <h1>Dashboard <span class="name" id="dash-name"></span></h1>
</header>
<div id="content"><div class="empty">Loading...</div></div>

<script>
(function() {
  // Extract dashboard name from URL: /dashboard/{name}
  var parts = location.pathname.replace(/\/+$/, '').split('/');
  var dashIdx = parts.indexOf('dashboard');
  var dashName = dashIdx >= 0 && parts.length > dashIdx + 1 ? decodeURIComponent(parts[dashIdx + 1]) : '';
  document.getElementById('dash-name').textContent = dashName;
  document.title = 'Dashboard — ' + (dashName || 'Fantastic');

  var content = document.getElementById('content');
  var dot = document.getElementById('ws-dot');
  var state = null;

  function fetchState() {
    fetch('/api/state')
      .then(function(r) { return r.json(); })
      .then(function(data) { state = data; render(); })
      .catch(function() {});
  }

  function render() {
    if (!state || !state.agents) {
      content.innerHTML = '<div class="empty">No data</div>';
      return;
    }

    // Top-level agents: no parent
    var topLevel = state.agents.filter(function(a) { return !a.parent; });
    if (topLevel.length === 0) {
      content.innerHTML = '<div class="empty">No top-level agents</div>';
      return;
    }

    // Group by bundle
    var groups = {};
    topLevel.forEach(function(a) {
      var b = a.bundle || 'other';
      if (!groups[b]) groups[b] = [];
      groups[b].push(a);
    });

    // Count children per agent
    var childCounts = {};
    state.agents.forEach(function(a) {
      if (a.parent) {
        childCounts[a.parent] = (childCounts[a.parent] || 0) + 1;
      }
    });

    // Sort group keys: canvas first, dashboard second, rest alphabetical
    var order = ['canvas', 'dashboard'];
    var keys = Object.keys(groups).sort(function(a, b) {
      var ai = order.indexOf(a), bi = order.indexOf(b);
      if (ai >= 0 && bi >= 0) return ai - bi;
      if (ai >= 0) return -1;
      if (bi >= 0) return 1;
      return a.localeCompare(b);
    });

    var html = '';
    keys.forEach(function(bundle) {
      html += '<div class="group">';
      html += '<div class="group-title">' + esc(bundle) + '</div>';
      html += '<div class="cards">';
      groups[bundle].forEach(function(a) {
        var name = a.display_name || a.id;
        var isSelf = a.bundle === 'dashboard' && a.display_name === dashName;
        var link = cardLink(a);
        var tag = link ? 'a' : 'div';
        var cls = 'card' + (isSelf ? ' self' : '') + (link ? ' clickable' : '');
        var href = link ? ' href="' + esc(link) + '"' : '';

        html += '<' + tag + ' class="' + cls + '"' + href + '>';
        html += '<div class="card-header">';
        html += '<span class="card-name">' + esc(name) + '</span>';
        html += '<span class="badge ' + esc(a.bundle || '') + '">' + esc(a.bundle || 'agent') + '</span>';
        html += '</div>';
        html += '<div class="card-meta">';
        html += '<span>' + esc(a.id) + '</span>';
        var children = childCounts[a.id] || 0;
        if (children > 0) {
          html += '<span>' + children + ' agent' + (children !== 1 ? 's' : '') + '</span>';
        }
        if (a.created) {
          html += '<span>' + formatTime(a.created) + '</span>';
        }
        html += '</div>';
        html += '</' + tag + '>';
      });
      html += '</div></div>';
    });

    content.innerHTML = html;
  }

  function cardLink(agent) {
    var name = agent.display_name || agent.id;
    if (agent.bundle === 'canvas') return '/canvas/' + encodeURIComponent(name);
    if (agent.bundle === 'dashboard') return '/dashboard/' + encodeURIComponent(name);
    return null;
  }

  function formatTime(ts) {
    try {
      var d = new Date(ts);
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch(e) { return ts; }
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // WebSocket for live updates
  var ws = null;
  var reconnectDelay = 1000;

  function connectWS() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = function() {
      dot.classList.add('connected');
      reconnectDelay = 1000;
    };

    ws.onclose = function() {
      dot.classList.remove('connected');
      setTimeout(connectWS, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
    };

    ws.onerror = function() {
      dot.classList.remove('connected');
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        var t = msg.type;
        if (t === 'agent_created' || t === 'agent_deleted' || t === 'agent_updated' || t === 'reload') {
          fetchState();
        }
      } catch(x) {}
    };
  }

  // Initial load
  fetchState();
  connectWS();
})();
</script>
</body>
</html>
