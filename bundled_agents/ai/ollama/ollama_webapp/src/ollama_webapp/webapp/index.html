<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>chat</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background: #0e0e16; color: #e0e0ff; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header { padding: 8px 14px; font-size: 12px; color: #999; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
  #header b { color: #cde; }
  #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 10px; line-height: 1.45; max-width: 85%; word-wrap: break-word; white-space: pre-wrap; font-size: 14px; }
  .msg.user { align-self: flex-end; background: #3a2f7a; color: #fff; position: relative; }
  .msg.user.queued { opacity: 0.55; font-style: italic; }
  .msg.user.queued::after {
    content: '⌛ queued';
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    background: #ffd16622;
    color: #ffd166;
    font-size: 11px;
    font-style: normal;
    vertical-align: middle;
  }
  .msg.assistant { align-self: flex-start; background: #1f1f2c; color: #cde; }
  #row { display: flex; padding: 10px; gap: 6px; border-top: 1px solid #222; }
  #input { flex: 1; background: #1a1a26; border: 1px solid #333; border-radius: 6px; padding: 8px 12px; color: #e0e0ff; font-size: 14px; outline: none; }
  #send { background: #4a3a8a; border: none; border-radius: 6px; color: white; padding: 8px 14px; cursor: pointer; transition: background 0.15s; }
  #send:disabled { opacity: 0.5; cursor: wait; }
  #send.stop { background: #b04646; }
  #send.stop:hover { background: #c05050; }
  #err { padding: 24px; font-family: monospace; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <span><b id="agentLabel"></b></span>
    <span id="modelLabel"></span>
  </div>
  <div id="messages"></div>
  <div id="row">
    <input id="input" placeholder="message…" autofocus>
    <button id="send">send</button>
  </div>
</div>
<script>
(async () => {
  const t = fantastic_transport();
  await t.ready;
  const me = await t.call(t.agentId, { type: 'reflect' });
  const upstream = me.upstream_id;
  if (!upstream) {
    document.body.innerHTML =
      `<pre id="err">ollama_webapp ${t.agentId}: upstream_id not set.\n` +
      `Configure with:\n  add ollama_webapp upstream_id=&lt;ollama_backend_id&gt;\n` +
      `or:\n  @core update_agent id=${t.agentId} upstream_id=&lt;ollama_backend_id&gt;</pre>`;
    return;
  }

  // Stable per-tab/per-user client_id, scoped to this upstream backend.
  // localStorage so refreshes preserve the chat thread.
  const CLIENT_KEY = `ollama_client_id:${upstream}`;
  let clientId = localStorage.getItem(CLIENT_KEY);
  if (!clientId) {
    clientId = 'web_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(CLIENT_KEY, clientId);
  }

  document.getElementById('agentLabel').textContent = `${t.agentId} → ${upstream}  (client ${clientId})`;
  const upstreamReflect = await t.call(upstream, { type: 'reflect' });
  document.getElementById('modelLabel').textContent = upstreamReflect.model || '';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // Load THIS client's history (per-client thread, not the global one).
  const h = await t.call(upstream, { type: 'history', client_id: clientId });
  if (h && h.messages) {
    for (const m of h.messages) addMsg(m.role, m.content || '');
  }

  // streaming state
  let streamEl = null;
  let streamText = '';
  // Track the user bubble for the in-flight request so we can mark it
  // "queued" on the `queued` event and clear the marker when streaming
  // begins (first `token` for our client_id).
  let pendingUserBubble = null;
  // Send/Stop button state. While a generation is in flight the button
  // says "stop" and clicking it calls the interrupt verb (Claude
  // Code-style cancel-mid-stream).
  let busy = false;
  function setBusy(on) {
    busy = on;
    if (on) {
      sendBtn.textContent = 'stop';
      sendBtn.classList.add('stop');
      sendBtn.title = 'interrupt the in-flight generation';
    } else {
      sendBtn.textContent = 'send';
      sendBtn.classList.remove('stop');
      sendBtn.title = '';
    }
    sendBtn.disabled = false;
  }

  function clearQueuedMarker() {
    if (pendingUserBubble && pendingUserBubble.classList.contains('queued')) {
      pendingUserBubble.classList.remove('queued');
    }
  }

  await t.watch(upstream);
  t.on('queued', (p) => {
    if (p.client_id && p.client_id !== clientId) return;
    if (p.source && p.source !== upstream) return;
    if (pendingUserBubble) pendingUserBubble.classList.add('queued');
  });
  t.on('token', (p) => {
    // Only render events tagged for THIS client. With the per-backend
    // FIFO lock, only one generation runs at a time anyway, but the
    // client_id filter keeps things strictly isolated even if that
    // changes later.
    if (p.client_id && p.client_id !== clientId) return;
    if (p.source && p.source !== upstream) return;
    // First token for our client → leaving the queue, generation started.
    clearQueuedMarker();
    if (!streamEl) { streamText = ''; streamEl = addMsg('assistant', ''); }
    streamText += p.text || '';
    streamEl.textContent = streamText;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
  t.on('done', (p) => {
    if (p.client_id && p.client_id !== clientId) return;
    if (p.source && p.source !== upstream) return;
    // Defensive: if a generation produced zero tokens (rare), `done`
    // still implies we're past the queue.
    clearQueuedMarker();
    streamEl = null;
    streamText = '';
    pendingUserBubble = null;
    setBusy(false);
    inputEl.focus();
  });

  async function submit() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    pendingUserBubble = addMsg('user', text);
    setBusy(true);
    try {
      await t.call(upstream, { type: 'send', text, client_id: clientId });
    } catch (e) {
      addMsg('assistant', 'ERROR: ' + e.message);
      setBusy(false);
      pendingUserBubble = null;
    }
  }

  async function interrupt() {
    // Fire-and-forget. Backend cancels its in-flight task and emits
    // `done` with interrupted:true → setBusy(false) via t.on('done').
    try { await t.call(upstream, { type: 'interrupt' }); }
    catch (e) { console.warn('[chat] interrupt failed:', e); }
  }

  sendBtn.addEventListener('click', () => (busy ? interrupt() : submit()));
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!busy) submit(); }
  });
})();
</script>
</body>
</html>
