[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-nvidia-nim-backend"
version = "0.1.0"
description = "Fantastic nvidia_nim_backend — NVIDIA NIM (OpenAI-compatible) LLM agent with native tool calls."
requires-python = ">=3.11"
dependencies = ["httpx"]

[project.entry-points."fantastic.bundles"]
nvidia_nim_backend = "nvidia_nim_backend.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/nvidia_nim_backend"]
