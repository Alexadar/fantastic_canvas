<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fantastic</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0e; color: #e0e0e0; overflow: hidden; }
  pre {
    font: 16px/1.6 ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80ch; text-align: left;
  }
  .m { color: #d946ef; }
  .d { color: #666; }
</style>
</head>
<body>
<pre>
  <span class="m">█</span>
  <span class="m">█</span>  <b>FANTASTIC</b>
  <span class="m">█</span>

  <span class="d">Waiting for UI...</span>
  <span class="d">Run <b>add</b> in the CLI to start.</span>
</pre>
<script>
var ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
ws.onmessage = function(e) {
  try { if (JSON.parse(e.data).type === 'reload') location.reload(); } catch(x) {}
};
</script>
</body>
</html>
