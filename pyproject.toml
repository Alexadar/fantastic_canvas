[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv.workspace]
members = ["core"]

[tool.uv.sources]
fantastic = { workspace = true }
torch = [
  { index = "pytorch-cpu", extra = "torch-cpu" },
  { index = "pytorch-cu124", extra = "torch-cuda" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true
