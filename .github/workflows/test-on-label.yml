name: Test on Label

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  test:
    if: >-
      github.event.action == 'labeled' && github.event.label.name == 'run-tests'
      || github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -n auto -v
