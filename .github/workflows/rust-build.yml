name: Rust Build & Test

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --workspace

      # Embedded-tier compile check — proves the iOS / sandboxed slice
      # builds clean without the `desktop` feature. When a future
      # subprocess-using bundle gets added under
      # `#[cfg(feature = "desktop")]`, this job is the canary that
      # catches accidental dependency-graph leakage into the embedded
      # build (e.g. an `embedded`-default crate that transitively pulls
      # in `std::process`).
      - name: cargo check (embedded-tier only)
        run: |
          cargo check -p fantastic-uniffi --no-default-features --features embedded
          cargo check -p fantastic-cli --no-default-features --features embedded
