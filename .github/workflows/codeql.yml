name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # GitHub previously auto-registered the javascript-typescript
        # configuration on refs/heads/main (canvas_webapp/index.html
        # and other agents serve substantial JS). Omitting it here
        # makes the PR merge overlay report "1 configuration not
        # found" because main expects both languages.
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Scope analysis to first-party source: skip vendored third-party
          # bundles (Three.js / xterm), the legacy transport.js copies, and
          # the browser-driving integration test harness (it constructs eval
          # strings by design). Mirrors the typos.toml vendored-asset excludes.
          config: |
            paths-ignore:
              - '**/vendor/**'
              - '**/transport.js'
              - src/lib/swift/Sources/FantasticWeb/Resources
              - src/lib/rust/crates/bundles/fantastic-web/src/assets
              - integration_tests

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
