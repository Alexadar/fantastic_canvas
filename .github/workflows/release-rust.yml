name: Release (rust)

# Manual, tag-driven release of the `fantastic` binary for the Rust runtime.
#
# Trigger: push a tag of the form `rust-v<semver>`.
#   git tag rust-v0.1.0 && git push origin rust-v0.1.0
#
# Builds 4 targets, packages each as `fantastic-<os>-<arch>.tar.gz`
# (binary at archive root for clean `tar -xzC ~/.local/bin` extract),
# uploads to a GitHub Release at the same tag, marks it as `latest`.
# Asset names match the URL pattern that fantastic_app's SSH bootstrap
# script curls: `fantastic-{linux,macos}-{aarch64,x86_64}.tar.gz`.
# Linux targets are musl so the bootstrap binary is self-contained
# (no glibc version dependency on the remote SSH host).

on:
  push:
    tags: ['rust-v*']

jobs:
  build:
    name: build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # asset       : the filename stem used on the release page
          # triple      : Rust target triple (rustc + cross)
          # cross       : use the `cross` container instead of native rustc
          - { os: macos-latest,  triple: aarch64-apple-darwin,        asset: fantastic-macos-aarch64,  cross: false }
          - { os: macos-13,      triple: x86_64-apple-darwin,         asset: fantastic-macos-x86_64,   cross: false }
          - { os: ubuntu-latest, triple: aarch64-unknown-linux-musl,  asset: fantastic-linux-aarch64,  cross: true  }
          - { os: ubuntu-latest, triple: x86_64-unknown-linux-musl,   asset: fantastic-linux-x86_64,   cross: true  }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: release-${{ matrix.triple }}

      # Native build for the macOS targets.
      - name: cargo build
        if: ${{ !matrix.cross }}
        run: cargo build -p fantastic-cli --release --target ${{ matrix.triple }}

      # Linux musl targets cross-compile via `cross` (containerized
      # toolchain — runs on x86_64 ubuntu but emits self-contained
      # static binaries for either arch, no glibc version baked in).
      - name: install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked --version 0.2.5

      - name: cross build
        if: ${{ matrix.cross }}
        run: cross build -p fantastic-cli --release --target ${{ matrix.triple }}

      # Archive contents: a single `fantastic` binary at the root.
      # Lets the SSH-bootstrap one-liner stay clean:
      #   curl -fsSL <url> | tar -xzC ~/.local/bin
      - name: package
        run: |
          cd target/${{ matrix.triple }}/release
          tar -czf ../../../${{ matrix.asset }}.tar.gz fantastic
          cd ../../..
          ls -la ${{ matrix.asset }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: rust/${{ matrix.asset }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # Sibling XCFramework build — produces the two Apple-side artefacts
  # the fantastic_app SPM consumer needs. Two tiers, two tarballs:
  #
  #   fantastic-xcframework-embedded.tar.gz
  #     `FantasticKernelEmbedded/` Swift Package + Fantastic-Embedded.xcframework
  #     iOS-safe — 3 slices (ios-arm64, ios-arm64-simulator, macos-universal)
  #
  #   fantastic-xcframework-full.tar.gz
  #     `FantasticKernelFull/` Swift Package + Fantastic-Full.xcframework
  #     Pro Mac PTY tier — 1 slice (macos-universal)
  xcframework:
    name: build XCFramework
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          # All Apple slices both variant scripts touch.
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: release-xcframework

      - name: install uniffi-bindgen
        run: cargo install --path crates/uniffi-bindgen --locked

      - name: build both XCFramework variants
        # The wrapper runs build-xcframework-embedded.sh then
        # build-xcframework-full.sh.
        run: ./scripts/build-xcframework.sh

      # Bundle each Swift Package as its own tarball — the app side
      # pulls only the tier it ships.
      - name: package embedded
        run: |
          cd packaging
          tar -czf ../fantastic-xcframework-embedded.tar.gz FantasticKernelEmbedded
          cd ..
          ls -la fantastic-xcframework-embedded.tar.gz

      - name: package full
        run: |
          cd packaging
          tar -czf ../fantastic-xcframework-full.tar.gz FantasticKernelFull
          cd ..
          ls -la fantastic-xcframework-full.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: fantastic-xcframework-embedded
          path: rust/fantastic-xcframework-embedded.tar.gz
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: fantastic-xcframework-full
          path: rust/fantastic-xcframework-full.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [build, xcframework]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list assets
        run: ls -la dist/

      - name: sha256 manifest
        working-directory: dist
        run: sha256sum *.tar.gz > sha256sums.txt && cat sha256sums.txt

      - uses: softprops/action-gh-release@v2
        with:
          # `${{ github.ref_name }}` is the pushed tag (e.g. `rust-v0.1.0`).
          # `action-gh-release` creates the release at that tag if it
          # doesn't exist yet; uploads files; marks as latest.
          files: |
            dist/fantastic-*.tar.gz
            dist/sha256sums.txt
          make_latest: 'true'
          fail_on_unmatched_files: true
          generate_release_notes: true
