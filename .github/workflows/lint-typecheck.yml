name: Lint & Type Check

on:
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ruff lint
        run: uvx ruff check kernel.py bundled_agents/ tests/

      - name: Ruff format check
        run: uvx ruff format --check kernel.py bundled_agents/ tests/
