name: Lint & Type Check

on:
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ruff lint
        run: uvx ruff check core/

      - name: Ruff format check
        run: uvx ruff format --check core/

  frontend-lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bundled_agents/canvas/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bundled_agents/canvas/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
