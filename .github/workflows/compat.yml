name: Wire-protocol Compat Probes

on:
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - 'rust/**'
      - '.github/workflows/compat.yml'

# Runs the same selftest.md probes against each runtime's binary and
# diffs the responses. Any divergence on the documented HTTP/WS
# contract fails the build.
jobs:
  compat:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Python runtime)
        uses: astral-sh/setup-uv@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Python deps
        working-directory: python
        run: uv sync --dev

      - name: Build Rust binary
        working-directory: rust
        run: cargo build --release --bin fantastic

      - name: Run compat probes
        run: |
          if [ -x rust/scripts/compat-python.sh ]; then
            ./rust/scripts/compat-python.sh
          else
            echo "rust/scripts/compat-python.sh not yet present (Phase 1 end deliverable). Skipping."
          fi
