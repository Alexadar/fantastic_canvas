<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>terminal</title>
<style>
  /* Transparent body so the canvas host's Liquid Glass frame chrome
     shows through behind the terminal. xterm itself already renders
     on transparent (allowTransparency + viewport bg below). */
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; color: #ddd; font-family: monospace; overflow: hidden; }
  /* Asymmetric right padding (14px vs 8px left) gives the cell grid a few
     pixels of slack to absorb sub-pixel cell-width drift from font hinting.
     Without it, the rightmost cell paints into fractional pixels on every
     line — xterm's wrap markers land mid-cell visually and you get the
     classic "?" replacement / half-char-break flake on long lines. */
  #term { width: 100%; height: 100%; padding: 6px 14px 6px 8px; box-sizing: border-box; }
  #err { padding: 16px; }
  /* Hard-clip horizontal: even if FitAddon over-proposes by sub-pixel,
     no horizontal scrollbar appears and the renderer stays aligned. */
  .xterm, .xterm-viewport { background: transparent !important; overflow-x: hidden !important; }
  .xterm-viewport { overflow-y: auto !important; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css">
</head>
<body>
<div id="term"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
<script>
(async () => {
  const t = fantastic_transport();
  await t.ready;
  const me = await t.call(t.agentId, { type: 'reflect' });
  const upstream = me.upstream_id;
  if (!upstream) {
    document.body.innerHTML =
      `<pre id="err">terminal_webapp ${t.agentId}: upstream_id not set.\n` +
      `Configure with:\n  add terminal_webapp upstream_id=&lt;terminal_backend_id&gt;\n` +
      `or:\n  @core update_agent id=${t.agentId} upstream_id=&lt;terminal_backend_id&gt;</pre>`;
    return;
  }

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'SF Mono', 'Menlo', monospace",
    allowTransparency: true,
    // Don't rewrap scrollback when the iframe resizes. Old lines freeze
    // at the columns they had when first written; new output wraps at
    // the current width. Stops the "lines moving around on resize"
    // jitter that comes with xterm's default reflow.
    reflowOnResize: false,
    theme: { background: '#00000000', foreground: '#e5e5e5', cursor: '#e5e5e5' },
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  const container = document.getElementById('term');
  term.open(container);

  // CRITICAL: wait for fonts before measuring cell metrics. xterm's
  // CharSizeService runs at .open() time using whatever font is
  // currently resolved — if a webfont (or fallback) hasn't loaded,
  // cellWidth is wrong and every subsequent fit propagates the error.
  // See xterm.js issues #1164, #1534, #2630.
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  await t.watch(upstream);

  term.onData(async (data) => {
    await t.call(upstream, { type: 'write', data });
  });

  // Image paste bridge. xterm only pastes text/plain — an image from
  // the browser clipboard would be silently dropped, and `claude`
  // running server-side can't reach the browser's clipboard. So grab
  // the image bytes here and ship them to the backend, which saves a
  // file and types its path into the PTY (mimics a file drag-drop —
  // the path-injection pattern Claude Code recognizes). Text paste is
  // untouched: no image item → xterm handles it as before.
  document.addEventListener('paste', async (ev) => {
    const items = (ev.clipboardData && ev.clipboardData.items) || [];
    for (const it of items) {
      if (it.kind === 'file' && it.type.startsWith('image/')) {
        ev.preventDefault();  // don't let xterm process an empty text paste
        const file = it.getAsFile();
        if (!file) continue;
        try {
          const buf = await file.arrayBuffer();
          await t.call(upstream, {
            type: 'paste_image',
            data: new Uint8Array(buf),
            mime: it.type,
          });
        } catch (e) {
          term.write('\r\n[image paste failed: ' + (e && e.message) + ']\r\n');
        }
        return;
      }
    }
  });
  term.onResize(async ({ cols, rows }) => {
    await t.call(upstream, { type: 'resize', cols, rows });
  });

  // Autoscroll — explicit, button-only. Matches the legacy bridge.js
  // contract: `term.write` alone never scrolls; output overflows below
  // the viewport and the user controls the scroll position. The button
  // is the ONLY thing that pulls the viewport to the bottom — and it
  // does so via a 100ms tick that fires only after output, so a
  // scrolled-up user can read history without being yanked back UNTIL
  // new output arrives.
  //
  // The button itself lives in the canvas frame's header (declared via
  // get_webapp's `header_buttons`); the canvas sends
  // {type:'header_button', id:'autoscroll'} over the browser bus on
  // click. We broadcast state changes back via
  // {type:'header_button_state', id, active} so the chip's `.active`
  // class tracks our internal state.
  let autoscroll = false;
  let pendingOutput = false;
  function broadcastChipState() {
    t.bus.broadcast({
      type: 'header_button_state',
      id: 'autoscroll',
      active: autoscroll,
    });
  }
  // bus.on auto-filters by target_id (only delivered when target_id
  // matches our agentId or is absent), so we just look at the verb.
  t.bus.on('header_button', (e) => {
    if (e.id !== 'autoscroll') return;
    autoscroll = !autoscroll;
    if (autoscroll) pendingOutput = true;  // jump to bottom on next tick
    broadcastChipState();
  });
  setInterval(() => {
    if (autoscroll && pendingOutput) {
      term.scrollToBottom();
      pendingOutput = false;
    }
  }, 100);

  // Flow control — mirror VSCode's integrated terminal. The backend
  // detaches its PTY reader once too many emitted chars sit unacked;
  // we ack each chunk AFTER xterm has actually parsed it (the
  // term.write callback), buffered so we send at most one ack per
  // CHAR_COUNT_ACK_SIZE chars (VSCode's AckDataBufferer). This is real
  // backpressure: the PTY is throttled to the speed xterm can render,
  // so a pasted script that floods output can't lock up the tab.
  const CHAR_COUNT_ACK_SIZE = 5000;
  let unsentAck = 0;
  function ackChars(n) {
    unsentAck += n;
    while (unsentAck >= CHAR_COUNT_ACK_SIZE) {
      unsentAck -= CHAR_COUNT_ACK_SIZE;
      t.call(upstream, { type: 'ack', chars: CHAR_COUNT_ACK_SIZE }).catch(() => {});
    }
  }

  t.on('output', (e) => {
    const d = e.data || '';
    term.write(d, () => ackChars(d.length));
    if (autoscroll) pendingOutput = true;
  });
  t.on('closed', () => term.write('\r\n[process closed]\r\n'));

  // tightFit: refit + force a renderer refresh so the canvas re-paints
  // with current metrics. Debounced via ResizeObserver below.
  function tightFit() {
    try {
      fit.fit();
      term.refresh(0, term.rows - 1);
    } catch (e) { /* layout still settling */ }
  }

  const ro = new ResizeObserver(() => {
    clearTimeout(ro._t);
    // Two-stage debounce: wait for ResizeObserver burst to quiet (80ms),
    // then defer to next animation frame so layout has fully committed
    // before we measure. Cuts the half-char flake on rapid resize.
    ro._t = setTimeout(() => requestAnimationFrame(tightFit), 80);
  });
  ro.observe(container);

  // Init order matters: fit FIRST (compute cols/rows), then boot the PTY,
  // then explicitly resize the PTY to match BEFORE replaying scrollback.
  // Otherwise vim/tmux replay against wrong dimensions and corrupt redraw.
  tightFit();
  await t.call(upstream, { type: 'boot' });
  await t.call(upstream, { type: 'resize', cols: term.cols, rows: term.rows });
  const r = await t.call(upstream, { type: 'output' });
  if (r && r.output) term.write(r.output);
})();
</script>
</body>
</html>
