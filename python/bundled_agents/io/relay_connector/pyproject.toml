[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-relay-connector"
version = "0.1.0"
description = "Fantastic relay_connector — cross-kernel comms through a relay-KERNEL router (../fantastic_relay, CONTRACT kernel v1): dial-out WS to ws://host/<guid>, group-password auth (X-Fantastic-Auth), GUID-routed JSON frames. Symmetric RPC tunneled over the relay; reuses the io_bridge engine."
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
dependencies = ["fantastic-io-bridge", "websockets>=12,<17"]

[project.entry-points."fantastic.bundles"]
relay_connector = "relay_connector.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/relay_connector"]
