[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-fs-loader"
version = "0.1.0"
description = "Fantastic fs_loader — the disk persistence/hydration root agent (the tree root)."
requires-python = ">=3.11"

[project.entry-points."fantastic.bundles"]
fs_loader = "fs_loader.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/fs_loader"]
