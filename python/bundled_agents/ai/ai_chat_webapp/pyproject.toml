[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-ai-chat-webapp"
version = "0.1.0"
description = "Fantastic ai_chat_webapp — provider-agnostic chat UI fronting any LLM backend (ollama, NVIDIA NIM, etc.) that answers send/history/interrupt."
requires-python = ">=3.11"
dependencies = []

[project.entry-points."fantastic.bundles"]
ai_chat_webapp = "ai_chat_webapp.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_chat_webapp"]
