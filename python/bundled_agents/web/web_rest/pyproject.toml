[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-web-rest"
version = "0.1.0"
description = "Fantastic web_rest — HTTP/REST verb-invocation surface (POST /<self_id>/<target_id> body=payload). Mounted as a route on the parent web's FastAPI app via the duck-typed `get_routes` verb."
requires-python = ">=3.11"
dependencies = ["fastapi"]

[project.entry-points."fantastic.bundles"]
web_rest = "web_rest.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/web_rest"]
