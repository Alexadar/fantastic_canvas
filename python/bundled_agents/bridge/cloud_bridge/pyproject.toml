[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-cloud-bridge"
version = "0.1.0"
description = "Fantastic cloud_bridge — cross-kernel comms through a zero-trust relay: dial-out WSS, token auth, relay pairing, peer↔peer end-to-end TLS 1.3 mTLS (CONTRACT v1). Reuses the bridge_core engine."
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
dependencies = ["fantastic-bridge-core", "websockets>=12,<17", "cryptography>=42", "pyopenssl>=24"]

[project.entry-points."fantastic.bundles"]
cloud_bridge = "cloud_bridge.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/cloud_bridge"]
