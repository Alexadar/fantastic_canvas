[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-local-runner"
version = "0.1.0"
description = "Fantastic local runner — `fantastic serve` lifecycle for local projects (subprocess + .fantastic/lock.json)."
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
# file_bridge provides `fs` — the single disk surface. local_runner reaches SIBLING
# project dirs (outside cwd by design) via fs's external surface.
dependencies = ["fantastic-runner-core", "fantastic-file-bridge"]

[project.entry-points."fantastic.bundles"]
local_runner = "local_runner.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/local_runner"]
