[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-file-bridge"
version = "0.1.0"
description = "Fantastic file_bridge agent — the fs-transport member of the io family: a sealed-by-default, running-dir-clamped filesystem edge."
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
dependencies = ["fantastic-io-bridge"]

[project.entry-points."fantastic.bundles"]
file_bridge = "file_bridge.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/file_bridge"]
