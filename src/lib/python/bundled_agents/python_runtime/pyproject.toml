[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fantastic-python-runtime"
version = "0.1.0"
description = "Fantastic python_runtime — async Python JOB spawner; start/status/stop parallel background jobs (python -u -c <code>) + an injected kernel connector."
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
dependencies = []

[project.entry-points."fantastic.bundles"]
python_runtime = "python_runtime.tools"

[tool.hatch.build.targets.wheel]
packages = ["src/python_runtime"]
