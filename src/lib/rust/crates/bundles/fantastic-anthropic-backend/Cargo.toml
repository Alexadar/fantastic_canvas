[package]
publish = false
name = "fantastic-anthropic-backend"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Anthropic (Claude Messages API) LLM bundle — same ai-core surface as ollama/nvidia, Anthropic transport + tool shape."

[dependencies]
fantastic-ai-core = { path = "../fantastic-ai-core" }
fantastic-bundle = { path = "../../fantastic-bundle" }
fantastic-kernel = { path = "../../fantastic-kernel" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
futures-util = "0.3"

[dev-dependencies]
fantastic-file = { path = "../fantastic-file" }
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
wiremock = "0.6"
