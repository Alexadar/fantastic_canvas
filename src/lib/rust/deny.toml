# cargo-deny config — security + license + dependency hygiene gate.
#
# Run via:  cargo deny check
# Also driven by:  scripts/quality.sh
#
# Philosophy: be strict on direct security signals (advisories, banned
# crates), permissive on common OSS licenses, warn (don't fail) on
# noisy categories like duplicate versions.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
    # serial v0.4.0 — unmaintained since 2017. Transitive via
    # portable-pty (used by fantastic-terminal-backend for PTY
    # spawning on Unix). Our code path doesn't touch portable-pty's
    # serial-port adapter — only the openpty/spawn surface — so the
    # unmaintained crate isn't reachable from our binary's runtime.
    # No safe upgrade exists; revisit when portable-pty drops it.
    { id = "RUSTSEC-2017-0008", reason = "transitive via portable-pty; code path not reachable" },
]

[licenses]
# The project's own license (workspace crates are AGPL-3.0-or-later), plus the
# common permissive OSS licenses every dep in our tree resolves to (all one-way
# compatible with AGPL). Tighten before publishing crates externally.
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "MIT-0",
    "0BSD",
    "OpenSSL",
    "Unlicense",
    "BSL-1.0",
    "BSD-2-Clause-Patent",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# `MIT OR Apache-2.0` dual licenses default to picking MIT (alphabetical
# tie-breaker). Without this, cargo-deny treats each side as needing
# its own allow entry, which is overly strict for dual-licensed crates.
[[licenses.exceptions]]
allow = ["MIT", "Apache-2.0"]
name = "*"

[bans]
multiple-versions = "warn"
# Reject `*` version specs on EXTERNAL deps (a real footgun — pulls
# whatever the resolver picks at any moment). Workspace path deps
# don't carry a version field at all (they're tied to the path), so
# cargo-deny flags them too — `allow-wildcard-paths = true` exempts
# the workspace-internal case.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "warn"
unknown-git = "warn"
